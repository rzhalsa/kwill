<!DOCTYPE html>
<html lang="en">

<head>
    <!-- <meta charset="UTF-8"> -->
    <title>Simple Character Sheet</title>


    <style>
        body {
            background: #e0e0e0;

            flex-direction: column;
            align-items: center;

        }

        .toolbar {
            width: 100%;
            background: #aaa;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #aaa;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }


        .toolbar-label {
            font-size: 24px;
            font-weight: bold;
        }

        .page-wrapper {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .kwill-logo {
            position: absolute;
            top: -50px;
            left: 10px;
            width: 300px;
            height: 300px;

        }

        .sheet {
            position: relative;
            background: #ffffff;
            width: 816px;
            height: 1056px;
            padding: 0px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);

            /* zoom: 0.65; */
            transform-origin: top center;
        }





        @media print {

            .toolbar,
            .toolbar-section,
            .toolbar-label {
                display: none;
            }

            .sheet {
                background: #ffffff;
            }
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <div class="toolbar-section">
            <label for="characterSelect">Character:</label>
            <select id="characterSelect">
                <option>------------</option>
            </select>
        </div>

    </div>

    <div class="page-wrapper">
        <div class="sheet">
            <div class="kwill-logo">
                <img src="assets/kwill.svg" alt="" width="300" height="300">

            </div>
        </div>

    </div>


</body>
