name: Frontend CI
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: Setup NodeJS
          uses: actions/setup-node@v3
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: dev/frontend/kwill-frontend/package-lock.json
        - name: Install dependencies
          run: npm install
          working-directory: dev/frontend/kwill-frontend
        - name: Run Frontend Tests
          run: npm run test
          working-directory: dev/frontend/kwill-frontend